<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flight Compare Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h1>Flight Compare Pro</h1>
<p>Compare round-trip airline fares and find the best deal.</p>
</header>

<div class="container">
<div class="search-box">
<input id="from" placeholder="From Airport (SAT)">
<input id="to" placeholder="To Airport (BOM)">
<label>Departure Date</label>
<input type="date" id="departureDate">
<label>Return Date</label>
<input type="date" id="returnDate">
<button onclick="searchFlights()">Search Flights</button>
</div>

<div id="bestDeal"></div>

<table id="results">
<thead>
<tr>
<th>Airline</th>
<th>Price</th>
<th>Stops</th>
<th>Book</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script src="script.js"></script>
</body>
</html>
